  card-mod-root-yaml: |
    .: |
      ha-card[outlined] {
        --ha-card-border-color: #383838 !important;
        --ha-card-border-width: 1px !important;
      }
      ha-picker-field,
      ha-combo-box,
      ha-combo-box-item,
      ha-dropdown-item,
      ha-textfield,
      ha-select,
      ha-md-select,
      ha-md-textfield {
        --mdc-text-field-fill-color: #1e1e1e !important;
        --mdc-text-field-disabled-fill-color: #1e1e1e !important;
        --mdc-select-fill-color: #1e1e1e !important;
        --mdc-select-disabled-fill-color: #1e1e1e !important;
        --mdc-text-field-ink-color: #e8e8e8 !important;
        --mdc-select-ink-color: #e8e8e8 !important;
        --md-filled-field-container-color: #1e1e1e !important;
        --md-filled-text-field-container-color: #1e1e1e !important;
        --md-outlined-text-field-container-color: #1e1e1e !important;
        --md-filled-select-text-field-container-color: #1e1e1e !important;
        --ha-color-fill-neutral-quiet-resting: #1e1e1e !important;
        --ha-color-fill-neutral-normal-resting: #1e1e1e !important;
        background-color: #1e1e1e !important;
        color: #e8e8e8 !important;
      }
      ha-picker-field {
        border-radius: 14px !important;
      }
  card-mod-sidebar-yaml: |
    .: |
      .badge {
        background-color: #5b9cf6 !important;
        color: #1e1e1e !important;
      }


